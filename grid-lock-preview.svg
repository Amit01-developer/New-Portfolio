<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">TraffiSense AI dashboard preview</title>
  <desc id="desc">A traffic intelligence dashboard thumbnail with analytics cards, a city map, and violation markers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#172554"/>
      <stop offset="1" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1030" cy="95" r="220" fill="#22d3ee" opacity="0.12"/>
  <circle cx="145" cy="620" r="260" fill="#6366f1" opacity="0.16"/>
  <g transform="translate(80 70)">
    <text x="0" y="28" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="700">TraffiSense AI</text>
    <text x="0" y="62" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Violation detection • OCR • Heatmaps • Safety index</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="72" y="158" width="256" height="130" rx="18" fill="url(#card)" stroke="#334155"/>
    <rect x="358" y="158" width="256" height="130" rx="18" fill="url(#card)" stroke="#334155"/>
    <rect x="644" y="158" width="256" height="130" rx="18" fill="url(#card)" stroke="#334155"/>
    <rect x="930" y="158" width="198" height="130" rx="18" fill="url(#card)" stroke="#334155"/>
  </g>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="102" y="205" fill="#94a3b8" font-size="18">Critical alerts</text>
    <text x="102" y="252" fill="#f8fafc" font-size="46" font-weight="800">128</text>
    <text x="388" y="205" fill="#94a3b8" font-size="18">Vehicles scanned</text>
    <text x="388" y="252" fill="#f8fafc" font-size="46" font-weight="800">9.4k</text>
    <text x="674" y="205" fill="#94a3b8" font-size="18">Safety index</text>
    <text x="674" y="252" fill="#22c55e" font-size="46" font-weight="800">82%</text>
    <text x="960" y="205" fill="#94a3b8" font-size="18">OCR plates</text>
    <text x="960" y="252" fill="#facc15" font-size="46" font-weight="800">312</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="72" y="330" width="514" height="260" rx="22" fill="#0f172a" stroke="#334155"/>
    <rect x="626" y="330" width="502" height="260" rx="22" fill="#0f172a" stroke="#334155"/>
  </g>
  <g transform="translate(102 368)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 176 C64 122 94 92 160 118 C216 140 250 40 308 62 C360 82 378 152 454 34" fill="none" stroke="#38bdf8" stroke-width="8"/>
    <path d="M0 204 H454" stroke="#334155" stroke-width="2"/>
    <path d="M0 150 H454 M0 96 H454 M0 42 H454" stroke="#1e293b" stroke-width="2"/>
    <circle cx="160" cy="118" r="10" fill="#f97316"/>
    <circle cx="308" cy="62" r="10" fill="#ef4444"/>
    <circle cx="454" cy="34" r="10" fill="#22c55e"/>
  </g>
  <g transform="translate(665 365)">
    <rect x="0" y="0" width="424" height="190" rx="18" fill="#172554"/>
    <path d="M8 148 C62 110 82 28 150 50 C230 74 242 140 330 112 C370 100 392 72 416 52" fill="none" stroke="#475569" stroke-width="18"/>
    <path d="M36 12 L104 178 M200 4 L220 186 M302 14 L384 174" stroke="#475569" stroke-width="14"/>
    <circle cx="144" cy="62" r="22" fill="#ef4444"/>
    <circle cx="284" cy="120" r="18" fill="#f97316"/>
    <circle cx="350" cy="84" r="16" fill="#facc15"/>
    <circle cx="144" cy="62" r="8" fill="#fff"/>
    <circle cx="284" cy="120" r="7" fill="#fff"/>
    <circle cx="350" cy="84" r="6" fill="#fff"/>
  </g>
</svg>
